## RentalHub Admin — на порту 8080 (окремий від Event Tool)
## /api/* проксується на тимошельний бекенд :8001
## Файл: /etc/nginx/sites-available/rentalhub-admin

server {
    listen 8080;
    server_name _;
    client_max_body_size 100M;

    # ─── Картинки товарів ────────────────────────────────────────
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # ─── API (єдиний бекенд) ─────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # ─── FastAPI docs ────────────────────────────────────────────
    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # ─── RentalHub фронт ─────────────────────────────────────────
    root /var/www/rentalhub-admin-build;
    index index.html;

    location /static/ {
        alias /var/www/rentalhub-admin-build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html без кешу — щоб юзери одразу бачили нові білди
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
