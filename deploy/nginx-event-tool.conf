## Уніфікований Nginx — порт 80
##   /          → Event Tool (клієнти)
##   /admin/    → RentalHub адмінка (білд з PUBLIC_URL=/admin)
##   /api/      → ЄДИНИЙ FastAPI backend (127.0.0.1:8001)
## Файл: /etc/nginx/sites-available/event-tool

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 100M;

    # ─── Картинки товарів (фізично на диску) ─────────────────────
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # ─── API (єдиний бекенд) ─────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # ─── FastAPI docs ────────────────────────────────────────────
    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # ============================================================
    # RENTALHUB ADMIN — під /admin (білдиться з PUBLIC_URL=/admin)
    # ============================================================
    location /admin/ {
        alias /var/www/rentalhub-admin-build/;
        try_files $uri $uri/ @admin_fallback;
    }

    # /admin/index.html — без кешу, щоб користувач завжди отримував свіжий білд
    location = /admin/index.html {
        alias /var/www/rentalhub-admin-build/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    location = /admin {
        return 301 /admin/;
    }

    location @admin_fallback {
        rewrite ^.*$ /admin/index.html last;
    }

    # ============================================================
    # EVENT TOOL — клієнтський фронт на корені
    # ============================================================
    root /var/www/event-tool-build;
    index index.html;

    # Статика Event Tool — НЕ перетинається з /admin/static через окремий location вище
    location /static/ {
        alias /var/www/event-tool-build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback для Event Tool (на корені)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
