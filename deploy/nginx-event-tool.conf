## Event Tool — клієнтський фронт на порту 80
## Бекенд на /api/* проксується на 127.0.0.1:8001
## Файл: /etc/nginx/sites-available/event-tool

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # ─── Картинки товарів ────────────────────────────────────────
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # ─── API (той самий бекенд що й у RH адмінки) ────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # ─── Event Tool фронт ────────────────────────────────────────
    root /var/www/event-tool-build;
    index index.html;

    location /static/ {
        alias /var/www/event-tool-build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
