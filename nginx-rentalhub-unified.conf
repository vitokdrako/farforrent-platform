server {
    listen 80 default_server;
    server_name 173.242.49.48 _;
    client_max_body_size 100M;

    # RH API (port 8001)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }

    # Event Tool API (port 8002)
    location /event-api/ {
        rewrite ^/event-api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # FastAPI docs (RH)
    location ~ ^/(docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
    }

    # RH admin under /admin
    location /admin {
        alias /var/www/farforrent/frontend_build;
        try_files $uri $uri/ /admin/index.html;
    }

    # Uploads (shared)
    location /uploads/ {
        alias /var/www/farforrent/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Event Tool frontend (ROOT)
    root /var/www/event-tool-build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
